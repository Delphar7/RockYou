<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14141a"/>
      <stop offset="1" stop-color="#0e0e13"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="720" height="980" rx="24" fill="url(#bg)"/>

  <!-- Top: press -->
  <g filter="url(#shadow)">
    <rect x="150" y="90" width="420" height="200" rx="30" fill="#662D91" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <text x="360" y="170" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="900">Sweepable button</text>
    <text x="360" y="198" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13">Hold to confirm sensitive actions</text>
    <rect x="250" y="224" width="220" height="44" rx="22" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.16)"/>
    <text x="360" y="252" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="800">Power</text>
  </g>

  <!-- Arrow down -->
  <g fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 305 C 360 360, 360 380, 360 430"/>
  </g>
  <g fill="rgba(255,255,255,0.30)">
    <path d="M 352 432 l 16 0 l -8 14 z"/>
  </g>

  <!-- Tooltip (early release) -->
  <g filter="url(#shadow)">
    <rect x="180" y="448" width="360" height="56" rx="28" fill="#fff"/>
    <text x="360" y="483" text-anchor="middle" fill="#662D91" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" font-weight="900">
      Hold to power off
    </text>
  </g>
  <text x="360" y="530" text-anchor="middle" fill="rgba(255,255,255,0.62)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12">
    Release early → a tooltip explains what the hold does
  </text>

  <!-- Arrow down -->
  <g fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 548 C 360 600, 360 620, 360 670"/>
  </g>
  <g fill="rgba(255,255,255,0.30)">
    <path d="M 352 672 l 16 0 l -8 14 z"/>
  </g>

  <!-- Bottom: overlay ring -->
  <g transform="translate(360 800)" filter="url(#shadow)">
    <circle r="178" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.10)"/>
    <circle r="140" fill="rgba(102,45,145,0.10)" stroke="rgba(102,45,145,0.40)" stroke-width="10"/>

    <!-- progress ring -->
    <circle r="140" fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="12"
            stroke-linecap="round"
            stroke-dasharray="520 900"
            transform="rotate(-90)"/>

    <text x="0" y="10" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="40" font-weight="900">⏻</text>
    <text x="0" y="62" text-anchor="middle" fill="rgba(255,255,255,0.70)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13">
      Hold…
    </text>
  </g>
</svg>
