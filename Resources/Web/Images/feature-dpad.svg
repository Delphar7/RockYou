<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14141a"/>
      <stop offset="1" stop-color="#0e0e13"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="720" height="980" rx="24" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="70" width="500" height="820" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.14)"/>
  </g>

  <!-- DPad ring -->
  <g transform="translate(360 280)" filter="url(#shadow)">
    <circle r="176" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle r="112" fill="rgba(102,45,145,0.18)" stroke="rgba(102,45,145,0.42)" stroke-width="2"/>
    <circle r="74" fill="#662D91" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>

    <!-- arrows -->
    <g fill="#fff" opacity="0.92" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="800">
      <text x="0" y="-132" text-anchor="middle">▲</text>
      <text x="0" y="150" text-anchor="middle">▼</text>
      <text x="-146" y="6" text-anchor="middle">◀</text>
      <text x="146" y="6" text-anchor="middle">▶</text>
    </g>
    <text x="0" y="10" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="900">OK</text>
  </g>

  <!-- vertical flow callouts -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <g filter="url(#shadow)">
      <rect x="160" y="510" width="400" height="140" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="200" y="552" fill="#fff" font-size="14" font-weight="900">Tap</text>
      <text x="200" y="578" fill="rgba(255,255,255,0.70)" font-size="13">Center = OK</text>
      <text x="200" y="602" fill="rgba(255,255,255,0.70)" font-size="13">Ring = arrows</text>
      <rect x="430" y="540" width="110" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
      <text x="485" y="562" text-anchor="middle" fill="#fff" font-size="12">single press</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="160" y="680" width="400" height="170" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="200" y="722" fill="#fff" font-size="14" font-weight="900">Swipe / drag</text>
      <text x="200" y="748" fill="rgba(255,255,255,0.70)" font-size="13">Start from the center</text>
      <text x="200" y="772" fill="rgba(255,255,255,0.70)" font-size="13">Keep dragging to repeat</text>
      <rect x="430" y="710" width="110" height="34" rx="17" fill="rgba(102,45,145,0.14)" stroke="rgba(102,45,145,0.36)"/>
      <text x="485" y="732" text-anchor="middle" fill="#fff" font-size="12">fast scroll</text>
    </g>
  </g>

  <g fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 468 C 360 488, 360 498, 360 506"/>
    <path d="M 360 650 C 360 668, 360 674, 360 678"/>
  </g>
  <g fill="rgba(255,255,255,0.28)">
    <path d="M 352 508 l 16 0 l -8 14 z"/>
    <path d="M 352 680 l 16 0 l -8 14 z"/>
  </g>
</svg>
