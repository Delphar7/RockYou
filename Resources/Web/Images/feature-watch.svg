<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 980">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14141a"/>
      <stop offset="1" stop-color="#0e0e13"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="720" height="980" rx="24" fill="url(#bg)"/>

  <!-- watch body (center) -->
  <g filter="url(#shadow)">
    <rect x="180" y="90" width="360" height="420" rx="94" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
    <rect x="220" y="132" width="280" height="336" rx="60" fill="#0b0b0d" stroke="rgba(255,255,255,0.12)"/>

    <!-- crown -->
    <circle cx="560" cy="300" r="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <circle cx="560" cy="300" r="7" fill="rgba(255,255,255,0.18)"/>

    <!-- screen content -->
    <text x="360" y="176" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" font-weight="900">Navigation</text>
    <text x="360" y="198" text-anchor="middle" fill="rgba(255,255,255,0.68)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12">Quick control</text>

    <g transform="translate(360 310)">
      <circle r="96" fill="rgba(102,45,145,0.18)" stroke="rgba(102,45,145,0.42)" stroke-width="2"/>
      <circle r="58" fill="#662D91" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
      <text x="0" y="10" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" font-weight="900">OK</text>
    </g>

    <rect x="252" y="416" width="216" height="36" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <text x="360" y="440" text-anchor="middle" fill="rgba(255,255,255,0.80)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12">Apps • Media • Power</text>
  </g>

  <!-- vertical callouts under watch -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <g filter="url(#shadow)">
      <rect x="120" y="560" width="480" height="140" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="160" y="602" fill="#fff" font-size="14" font-weight="900">3 pages</text>
      <text x="160" y="628" fill="rgba(255,255,255,0.70)" font-size="13">Quick Actions</text>
      <text x="160" y="652" fill="rgba(255,255,255,0.70)" font-size="13">Navigation</text>
      <text x="160" y="676" fill="rgba(255,255,255,0.70)" font-size="13">Media</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="120" y="730" width="480" height="160" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="160" y="772" fill="#fff" font-size="14" font-weight="900">Crown = volume</text>
      <text x="160" y="798" fill="rgba(255,255,255,0.70)" font-size="13">Turn for volume up/down</text>
      <text x="160" y="822" fill="rgba(255,255,255,0.70)" font-size="13">Perfect for quick adjustments</text>
      <rect x="430" y="768" width="140" height="36" rx="18" fill="rgba(102,45,145,0.14)" stroke="rgba(102,45,145,0.36)"/>
      <text x="500" y="792" text-anchor="middle" fill="#fff" font-size="12">volume</text>
    </g>
  </g>
</svg>
