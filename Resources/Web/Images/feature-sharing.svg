<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14141a"/>
      <stop offset="1" stop-color="#0e0e13"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#662D91"/>
      <stop offset="1" stop-color="#7a38aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="720" height="1080" rx="24" fill="url(#bg)"/>

  <!-- Top household -->
  <g filter="url(#shadow)">
    <rect x="140" y="80" width="440" height="270" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="170" y="110" width="380" height="60" rx="18" fill="url(#purple)"/>
    <text x="360" y="148" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="900">Household</text>
    <text x="360" y="196" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13">
      Shared pairings + shared app ordering
    </text>
    <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12">
      <rect x="170" y="216" width="380" height="44" rx="14" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="360" y="244" text-anchor="middle" fill="#fff">TV + Streamer pairings</text>
      <rect x="170" y="272" width="380" height="44" rx="14" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
      <text x="360" y="300" text-anchor="middle" fill="#fff">Most-recent apps (MRU)</text>
    </g>
  </g>

  <!-- arrows down from household -->
  <g fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 360 C 360 410, 360 430, 360 470"/>
  </g>
  <g fill="rgba(255,255,255,0.26)">
    <path d="M 352 472 l 16 0 l -8 14 z"/>
  </g>

  <!-- Devices stacked -->
  <g filter="url(#shadow)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <rect x="140" y="486" width="440" height="130" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
    <text x="360" y="536" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">iPhone / iPad</text>
    <text x="360" y="562" text-anchor="middle" fill="rgba(255,255,255,0.68)" font-size="12">primary setup</text>
  </g>

  <g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 626 C 360 656, 360 666, 360 696"/>
  </g>
  <g fill="rgba(255,255,255,0.22)">
    <path d="M 352 698 l 16 0 l -8 14 z"/>
  </g>

  <g filter="url(#shadow)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <rect x="140" y="712" width="440" height="140" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
    <text x="360" y="766" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">Mac</text>
    <text x="360" y="792" text-anchor="middle" fill="rgba(255,255,255,0.68)" font-size="12">same household view</text>
  </g>

  <g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="4" stroke-linecap="round">
    <path d="M 360 864 C 360 882, 360 888, 360 906"/>
  </g>
  <g fill="rgba(255,255,255,0.22)">
    <path d="M 352 908 l 16 0 l -8 14 z"/>
  </g>

  <g filter="url(#shadow)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <rect x="140" y="922" width="440" height="120" rx="20" fill="#171722" stroke="rgba(255,255,255,0.14)"/>
    <text x="360" y="968" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">Watch</text>
    <text x="360" y="992" text-anchor="middle" fill="rgba(255,255,255,0.68)" font-size="12">quick control companion</text>
  </g>
</svg>
